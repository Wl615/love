<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ 专属告白</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{margin:0;background:black;overflow:hidden;font-family:Microsoft YaHei;}
canvas{position:absolute;}
.ui{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;color:white;
}
.title{font-size:36px;}
.typing{margin-top:20px;font-size:20px;}
.btn{
  margin-top:20px;padding:10px 25px;
  border-radius:30px;
  background:linear-gradient(45deg,#ff3d6d,#ff7aa2);
}
.small{font-size:14px;margin-top:10px;opacity:.7}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="ui">
  <div class="title" id="title"></div>
  <div class="typing" id="text"></div>

  <div class="btn" onclick="start()">开启心动 💘</div>
  <div class="btn" onclick="accept()">❤️ 我愿意</div>
  <div class="btn" onclick="save()">📸 保存瞬间</div>
  <div class="btn" onclick="makeQR()">🔗 生成专属二维码</div>

  <canvas id="qr" width="120" height="120"></canvas>
  <div class="small">长按二维码可分享</div>
</div>

<audio id="bgm" src="https://music.163.com/song/media/outer/url?id=1824045033.mp3" loop></audio>

<script>
// ===== 名字参数 =====
const url = new URL(location.href);
const A = url.searchParams.get("a") || "黑蛋";
const B = url.searchParams.get("b") || "陈京涛";

document.getElementById("title").innerText = `❤️ ${A} ❤️ ${B}`;

// ===== 打字机 =====
function typing(){
  let str = `${B}，不是一时兴起，是认真到想和你有未来...`;
  let i=0;
  let el=document.getElementById("text");

  let t=setInterval(()=>{
    el.innerText=str.substring(0,i++);
    if(i>str.length) clearInterval(t);
  },80);
}

// ===== 音乐 =====
function start(){
  document.getElementById("bgm").play();
  typing();
  explode();
}

// ===== 接受动画 =====
function accept(){
  alert("❤️ 未来请多指教 ❤️");
}

// ===== 截图 =====
function save(){
  html2canvas(document.body).then(canvas=>{
    let link=document.createElement("a");
    link.download="love.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

// ===== 二维码 =====
function makeQR(){
  let link = location.origin + location.pathname + `?a=${A}&b=${B}`;
  QRCode.toCanvas(document.getElementById("qr"), link);
}

// ===== 粒子系统 =====
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();onresize=resize;

let particles=[],time=0,mode=0;

function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
  }
}

for(let t=0;t<Math.PI*2;t+=0.012){
  let h=heart(t);
  particles.push({
    baseX:h.x,baseY:h.y,
    x:(Math.random()-0.5)*2000,
    y:(Math.random()-0.5)*2000,
    vx:0,vy:0
  });
}

function explode(){
  mode=1;
  particles.forEach(p=>{
    p.vx=(Math.random()-0.5)*20;
    p.vy=(Math.random()-0.5)*20;
  });
  setTimeout(()=>mode=2,1500);
}

function draw(){
  requestAnimationFrame(draw);

  ctx.fillStyle="rgba(0,0,0,0.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  time+=0.05;
  let scale=10+Math.sin(time)*2;

  // 星空
  for(let i=0;i<60;i++){
    ctx.fillStyle="white";
    ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,1,1);
  }

  particles.forEach(p=>{
    if(mode===0){
      let tx=p.baseX*scale;
      let ty=-p.baseY*scale;
      p.x+=(tx-p.x)*0.08;
      p.y+=(ty-p.y)*0.08;
    }else if(mode===1){
      p.vy+=0.3;
      p.x+=p.vx;
      p.y+=p.vy;
    }else{
      let tx=p.baseX*scale;
      let ty=-p.baseY*scale;
      p.x+=(tx-p.x)*0.05;
      p.y+=(ty-p.y)*0.05;
    }

    let px=p.x+canvas.width/2;
    let py=p.y+canvas.height/2;

    for(let i=0;i<4;i++){
      ctx.beginPath();
      ctx.arc(px,py,2+i*3,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,80,150,${0.12-i*0.03})`;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(px,py,2,0,Math.PI*2);
    ctx.fillStyle="#ff4d88";
    ctx.fill();
  });
}
draw();
</script>

<!-- 截图库 -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
