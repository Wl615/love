<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ 专属告白</title>

<style>
body{margin:0;background:black;overflow:hidden;font-family:Microsoft YaHei;}
canvas{position:absolute;}
.ui{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;color:white;
}
.title{font-size:42px;}
.typing{margin-top:20px;font-size:20px;}
.btn{
  margin-top:40px;padding:12px 28px;
  border-radius:30px;
  background:linear-gradient(45deg,#ff3d6d,#ff7aa2);
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="ui">
  <div class="title">❤️ 黑蛋 ❤️ XXX</div>
  <div class="typing" id="text"></div>
  <div class="btn" onclick="start()">开启心动 💘</div>
</div>

<audio id="bgm" src="https://music.163.com/song/media/outer/url?id=1824045033.mp3" loop></audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
onresize=resize;

let particles=[],time=0,mode=0;

// ❤️ 爱心
function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
  }
}

// 初始化
for(let t=0;t<Math.PI*2;t+=0.012){
  let h=heart(t);
  particles.push({
    baseX:h.x,baseY:h.y,
    x:(Math.random()-0.5)*2000,
    y:(Math.random()-0.5)*2000,
    vx:0,vy:0
  });
}

// 打字机
let str="不是一时兴起，是认真到想和你有未来...";
let i=0;
function typing(){
  let el=document.getElementById("text");
  let timer=setInterval(()=>{
    el.innerText=str.substring(0,i++);
    if(i>str.length) clearInterval(timer);
  },80);
}

// 点击触发
function start(){
  document.getElementById("bgm").play();
  typing();

  mode=1;
  particles.forEach(p=>{
    p.vx=(Math.random()-0.5)*20;
    p.vy=(Math.random()-0.5)*20;
  });

  setTimeout(()=>mode=2,1500);
}

// 动画
function draw(){
  requestAnimationFrame(draw);

  ctx.fillStyle="rgba(0,0,0,0.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  time+=0.05;
  let scale=10+Math.sin(time)*2;

  // ⭐ 星空
  for(let i=0;i<80;i++){
    ctx.fillStyle="white";
    ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,1,1);
  }

  particles.forEach(p=>{

    if(mode===0){
      let tx=p.baseX*scale;
      let ty=-p.baseY*scale;
      p.x+=(tx-p.x)*0.08;
      p.y+=(ty-p.y)*0.08;
    }else if(mode===1){
      p.vy+=0.3;
      p.x+=p.vx;
      p.y+=p.vy;
    }else{
      let tx=p.baseX*scale;
      let ty=-p.baseY*scale;
      p.x+=(tx-p.x)*0.05;
      p.y+=(ty-p.y)*0.05;
    }

    let px=p.x+canvas.width/2;
    let py=p.y+canvas.height/2;

    // 泛光
    for(let i=0;i<4;i++){
      ctx.beginPath();
      ctx.arc(px,py,2+i*3,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,80,150,${0.12-i*0.03})`;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(px,py,2,0,Math.PI*2);
    ctx.fillStyle="#ff4d88";
    ctx.fill();
  });
}
draw();
</script>

</body>
</html>
